<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MqttBox</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #eff2f6;
        color: #1f2937;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "PingFang SC",
          "Segoe UI",
          sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #1c1c1e;
          color: #f5f5f7;
        }
      }

      .startup-root {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
      }

      .startup-card {
        display: flex;
        min-width: 220px;
        align-items: center;
        gap: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        padding: 18px 22px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        .startup-card {
          background: rgba(44, 44, 46, 0.72);
          box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        }
      }

      .startup-logo {
        display: inline-flex;
        height: 34px;
        width: 34px;
        align-items: center;
        justify-content: center;
        border-radius: 11px;
        background: linear-gradient(135deg, #2997ff, #0a84ff);
        color: #fff;
        font-size: 15px;
        font-weight: 700;
      }

      .startup-copy {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .startup-name {
        font-size: 14px;
        font-weight: 600;
      }

      .startup-hint {
        font-size: 12px;
        opacity: 0.68;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="startup-root">
        <div class="startup-card">
          <div class="startup-logo">M</div>
          <div class="startup-copy">
            <div class="startup-name">MqttBox</div>
            <div class="startup-hint">Loading workspace…</div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
